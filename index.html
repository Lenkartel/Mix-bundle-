<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<title>Mix Bundle Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:"Plus Jakarta Sans",sans-serif;
}

:root{
--green:#00a651;
--green2:#00d26a;
--dark:#0f172a;
--soft:#f4fff8;
}

body{

background:
linear-gradient(
135deg,
#dfffe9,
#bfffd5,
#effff5
);

display:flex;
align-items:center;
justify-content:center;

padding:10px;
position:relative;
overflow:hidden;
}

.bg-circle{
position:absolute;
border-radius:50%;
filter:blur(70px);
opacity:.35;
z-index:0;
}

.bg1{
width:280px;
height:280px;
background:#00ff88;
top:-120px;
left:-100px;
}

.bg2{
width:320px;
height:320px;
background:#00c76a;
bottom:-120px;
right:-100px;
}

.app{

position:relative;
z-index:1;

width:100%;
max-width:430px;
height:96vh;

background:
rgba(255,255,255,.82);

backdrop-filter:blur(14px);

border-radius:30px;

padding:16px;

box-shadow:
0 20px 60px rgba(0,0,0,.12);

display:flex;
flex-direction:column;

overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.title h1{
font-size:24px;
font-weight:900;
color:var(--green);
line-height:1;
}

.title p{
font-size:11px;
margin-top:4px;
color:#555;
}

.logo-box{

display:flex;
align-items:center;
gap:8px;

background:white;

padding:8px 12px;

border-radius:14px;

box-shadow:
0 8px 20px rgba(0,0,0,.06);
}

.logo-box img{
height:24px;
object-fit:contain;
}

.price-circle{

width:150px;
height:150px;

margin:8px auto 14px;

border-radius:50%;

background:
linear-gradient(
135deg,
var(--green),
var(--green2)
);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;

box-shadow:
0 18px 40px rgba(0,166,81,.35);

animation:pulse 2s infinite;

flex-shrink:0;
}

.price-circle h2{
font-size:38px;
font-weight:900;
}

.price-circle span{
font-size:12px;
margin-top:4px;
opacity:.92;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

.tabs{

display:grid;
grid-template-columns:repeat(5,1fr);

gap:6px;
margin-bottom:12px;
}

.tab{

padding:10px 4px;

border-radius:12px;

background:white;

text-align:center;

font-size:10px;
font-weight:800;

cursor:pointer;

transition:.25s;

box-shadow:
0 6px 14px rgba(0,0,0,.05);
}

.tab.active{

background:
linear-gradient(
135deg,
var(--green),
var(--green2)
);

color:white;
}

.card{

flex:1;

background:white;

border-radius:24px;

padding:16px;

overflow:hidden;

box-shadow:
0 12px 30px rgba(0,0,0,.06);
}

.badge{

display:inline-block;

padding:5px 10px;

border-radius:999px;

font-size:10px;
font-weight:800;

background:#ecfff3;
color:var(--green);

margin-bottom:10px;
}

.card h3{
font-size:24px;
font-weight:900;
color:var(--green);
margin-bottom:5px;
}

.card p{
font-size:12px;
color:#555;
margin-bottom:12px;
}

.group{
margin-top:14px;
}

.group label{

display:flex;
justify-content:space-between;

font-size:12px;
font-weight:800;

margin-bottom:6px;
}

.value{
color:var(--green);
}

input[type=range]{

width:100%;
height:8px;

border-radius:999px;

appearance:none;

background:
linear-gradient(
90deg,
var(--green),
var(--green2)
);

outline:none;
}

input[type=range]::-webkit-slider-thumb{

appearance:none;

width:20px;
height:20px;

border-radius:50%;

background:white;

border:3px solid var(--green);

cursor:pointer;
}

.summary{

margin-top:14px;

background:
linear-gradient(
135deg,
#f7fff9,
#ebfff3
);

border:1px solid rgba(0,166,81,.12);

padding:12px;

border-radius:16px;
}

.summary div{
font-size:12px;
font-weight:700;
margin:6px 0;
}

.pay-btn{

margin-top:14px;

background:
linear-gradient(
135deg,
var(--green),
var(--green2)
);

color:white;

padding:15px;

border-radius:16px;

text-align:center;

font-weight:900;

font-size:15px;

cursor:pointer;

box-shadow:
0 12px 25px rgba(0,166,81,.35);

transition:.25s;
}

.pay-btn:active{
transform:scale(.98);
}

.toast{

position:absolute;

top:18px;
left:50%;

transform:translateX(-50%);

background:
linear-gradient(
135deg,
#111827,
#1f2937
);

color:white;

padding:12px 16px;

border-radius:14px;

font-size:12px;
font-weight:700;

display:none;

z-index:999;
}

.modal{

position:fixed;
inset:0;

background:rgba(0,0,0,.45);

display:none;

align-items:center;
justify-content:center;

padding:20px;
}

.modal-box{

background:white;

width:100%;
max-width:360px;

border-radius:22px;

padding:20px;
}

.modal-box h2{
font-size:22px;
font-weight:900;
color:var(--green);
margin-bottom:10px;
}

.modal-details{

background:#f9fafb;

padding:14px;

border-radius:14px;

line-height:1.9;

font-size:14px;

margin-bottom:14px;
}

.modal-actions{

display:flex;
gap:10px;
justify-content:flex-end;
}

.btn{

padding:12px 14px;

border:none;

border-radius:12px;

font-weight:800;

cursor:pointer;
}

.cancel{
background:#eee;
}

.confirm{

background:
linear-gradient(
135deg,
var(--green),
var(--green2)
);

color:white;
}

@media(max-height:760px){

.price-circle{
width:130px;
height:130px;
}

.price-circle h2{
font-size:32px;
}

.card{
padding:14px;
}

.group{
margin-top:12px;
}

}

</style>
</head>

<body>

<div class="bg-circle bg1"></div>
<div class="bg-circle bg2"></div>

<div class="toast" id="toast">
Bundle selected successfully
</div>

<div class="app">

<div class="header">

<div class="title">
<h1>Mix Bundle</h1>
<p>Voice • SMS • Data</p>
</div>

<div class="logo-box">
<img src="assets/ecocash.png">
<img src="assets/logo.avif">
</div>

</div>

<div class="price-circle">

<h2 id="price">
$0.00
</h2>

<span>
Bundle Price
</span>

</div>

<div class="tabs">

<div class="tab active"
onclick="selectPlan('daily',this)">
Daily
</div>

<div class="tab"
onclick="selectPlan('3days',this)">
3 Days
</div>

<div class="tab"
onclick="selectPlan('weekly',this)">
Weekly
</div>

<div class="tab"
onclick="selectPlan('2weeks',this)">
2 Weeks
</div>

<div class="tab"
onclick="selectPlan('monthly',this)">
Monthly
</div>

</div>

<div class="card">

<div class="badge">
MIX IT YOUR WAY 📱
</div>

<h3>Bundle Builder</h3>

<p>
Customise your Voice, SMS and Data bundle.
</p>

<div class="group">

<label>
<span>Voice</span>
<span class="value" id="voiceValue">
0 Min
</span>
</label>

<input
type="range"
id="voice"
value="0"
oninput="calculateBundle()">

</div>

<div class="group">

<label>
<span>SMS</span>
<span class="value" id="smsValue">
0 SMS
</span>
</label>

<input
type="range"
id="sms"
value="0"
oninput="calculateBundle()">

</div>

<div class="group">

<label>
<span>Data</span>
<span class="value" id="dataValue">
0 GB
</span>
</label>

<input
type="range"
id="data"
value="0"
oninput="calculateBundle()">

</div>

<div class="summary">

<div>
📆 <span id="summaryDuration">
Daily
</span>
</div>

<div>
📞 <span id="summaryVoice">
0 Minutes
</span>
</div>

<div>
💬 <span id="summarySms">
0 SMS
</span>
</div>

<div>
🌐 <span id="summaryData">
0 GB
</span>
</div>

<div>
💵 <span id="summaryAmount">
USD 0.00
</span>
</div>

</div>

<div class="pay-btn"
onclick="openModal()">

Pay with EcoCash

</div>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h2>
Bundle Selected
</h2>

<div class="modal-details"
id="details">
</div>

<div class="modal-actions">

<button class="btn cancel"
onclick="closeModal()">
Cancel
</button>

<button class="btn confirm"
onclick="confirmBundle()">

Continue

</button>

</div>

</div>

</div>

<script>

let currentPlan = "daily";

const plans = {

daily:{
maxData:3,
maxVoice:20,
maxSms:25,
price:0.60
},

"3days":{
maxData:8,
maxVoice:50,
maxSms:75,
price:1.40
},

weekly:{
maxData:20,
maxVoice:120,
maxSms:200,
price:2.80
},

"2weeks":{
maxData:45,
maxVoice:250,
maxSms:450,
price:5.20
},

monthly:{
maxData:100,
maxVoice:600,
maxSms:1000,
price:9.90
}

};

function selectPlan(plan,el){

currentPlan = plan;

document.querySelectorAll(".tab")
.forEach(tab=>{
tab.classList.remove("active");
});

el.classList.add("active");

updatePlan();

}

function updatePlan(){

const plan = plans[currentPlan];

const voice =
document.getElementById("voice");

const sms =
document.getElementById("sms");

const data =
document.getElementById("data");

voice.max = plan.maxVoice;
sms.max = plan.maxSms;
data.max = plan.maxData;

voice.value = plan.maxVoice;
sms.value = plan.maxSms;
data.value = plan.maxData;

calculateBundle();

}

function calculateBundle(){

const plan = plans[currentPlan];

const voice =
Number(document.getElementById("voice").value);

const sms =
Number(document.getElementById("sms").value);

const data =
Number(document.getElementById("data").value);

document.getElementById("voiceValue")
.innerHTML = voice + " Min";

document.getElementById("smsValue")
.innerHTML = sms + " SMS";

document.getElementById("dataValue")
.innerHTML = data + " GB";

const total =

(
(data / plan.maxData) +
(voice / plan.maxVoice) +
(sms / plan.maxSms)

) / 3 * plan.price;

document.getElementById("price")
.innerHTML =
"$" + total.toFixed(2);

document.getElementById("summaryDuration")
.innerHTML = currentPlan;

document.getElementById("summaryVoice")
.innerHTML =
voice + " Minutes";

document.getElementById("summarySms")
.innerHTML =
sms + " SMS";

document.getElementById("summaryData")
.innerHTML =
data + " GB";

document.getElementById("summaryAmount")
.innerHTML =
"USD " + total.toFixed(2);

}

function openModal(){

const voice =
document.getElementById("voice").value;

const sms =
document.getElementById("sms").value;

const data =
document.getElementById("data").value;

const amount =
document.getElementById("summaryAmount")
.textContent;

document.getElementById("details")
.innerHTML = `

<div>
<strong>Bundle:</strong>
${currentPlan}
</div>

<div>
<strong>Voice:</strong>
${voice} Minutes
</div>

<div>
<strong>SMS:</strong>
${sms} SMS
</div>

<div>
<strong>Data:</strong>
${data} GB
</div>

<div>
<strong>Amount:</strong>
${amount}
</div>

`;

document.getElementById("modal")
.style.display = "flex";

}

function closeModal(){

document.getElementById("modal")
.style.display = "none";

}

function confirmBundle(){

closeModal();

const toast =
document.getElementById("toast");

toast.innerHTML =
"Bundle selected successfully";

toast.style.display = "block";

setTimeout(()=>{

toast.style.display = "none";

},2500);

}

updatePlan();

</script>

</body>
</html>
