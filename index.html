<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<title>Mix Bundle Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:"Plus Jakarta Sans",system-ui;
}

:root{
--theme:#00a651;
--theme-dark:#008447;
--theme-soft:#eafff1;
--accent:#ffcc00;
}

body{

background:
linear-gradient(
135deg,
#dfffe9,
#c5ffd9,
#e9fff1
);

display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
padding:10px;
}

.wave{
position:fixed;
width:700px;
height:700px;
border-radius:50%;

background:
radial-gradient(circle,
rgba(0,166,81,.16),
transparent 70%);

filter:blur(50px);

animation:float 18s infinite linear;

z-index:-1;
}

.wave.one{
top:-250px;
left:-250px;
}

.wave.two{
bottom:-250px;
right:-250px;
animation-duration:25s;
}

@keyframes float{

0%{
transform:translateY(0) rotate(0deg);
}

50%{
transform:translateY(25px) rotate(8deg);
}

100%{
transform:translateY(0) rotate(0deg);
}

}

.page{

width:100%;
max-width:430px;
height:96vh;

background:
rgba(255,255,255,.82);

backdrop-filter:blur(14px);

border-radius:28px;

padding:18px;

overflow:hidden;

box-shadow:
0 20px 60px rgba(0,0,0,.12);

display:flex;
flex-direction:column;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
gap:10px;
}

.title-block h1{
margin:0;
font-size:24px;
font-weight:900;
color:var(--theme);
line-height:1;
}

.title-block p{
margin:4px 0 0;
font-size:11px;
color:#555;
}

.logo-wrap{

display:flex;
align-items:center;
gap:8px;

background:white;

padding:8px 12px;

border-radius:14px;

box-shadow:
0 8px 20px rgba(0,0,0,.06);
}

.logo-wrap img{
display:block;
object-fit:contain;
}

.logo-eco{
height:24px;
}

.logo-dark{
height:24px;
}

.price-circle{

width:140px;
height:140px;

margin:10px auto;

border-radius:50%;

background:
linear-gradient(
135deg,
#00a651,
#00c76a
);

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

color:white;

box-shadow:
0 18px 40px rgba(0,166,81,.35);

animation:pulse 2s infinite;
flex-shrink:0;
}

.price-circle h2{
margin:0;
font-size:34px;
font-weight:900;
}

.price-circle span{
margin-top:5px;
font-size:11px;
opacity:.95;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

.duration-tabs{

display:grid;
grid-template-columns:repeat(5,1fr);

gap:6px;
margin:8px 0 12px;
}

.tab{

padding:10px 4px;

border-radius:12px;

text-align:center;

font-weight:800;

font-size:11px;

background:white;

cursor:pointer;

transition:.25s;

box-shadow:
0 6px 14px rgba(0,0,0,.05);
}

.tab.active{

background:
linear-gradient(
135deg,
#00a651,
#00c76a
);

color:white;
}

.plan-card{

flex:1;

border-radius:22px;

padding:16px;

background:white;

box-shadow:
0 14px 35px rgba(0,0,0,.08);

overflow:hidden;
}

.plan-tag{

font-size:10px;

background:var(--theme-soft);

color:var(--theme);

padding:5px 10px;

border-radius:999px;

display:inline-block;

margin-bottom:8px;

font-weight:800;
}

.plan-name{

font-size:24px;

font-weight:900;

color:var(--theme);

margin-bottom:6px;
}

.plan-duration{

font-size:12px;

color:#555;

line-height:1.5;

margin-bottom:12px;
}

.input-group{
margin-top:14px;
}

.input-group label{

display:flex;
justify-content:space-between;

font-weight:800;

margin-bottom:6px;

font-size:12px;
}

.slider-value{
color:var(--theme);
}

input[type=range]{

width:100%;
height:8px;

border-radius:999px;

appearance:none;

background:
linear-gradient(
90deg,
#00a651,
#00c76a
);

outline:none;
}

input[type=range]::-webkit-slider-thumb{

appearance:none;

width:18px;
height:18px;

border-radius:50%;

background:white;

border:3px solid var(--theme);

cursor:pointer;
}

.summary-card{

margin-top:14px;

padding:12px;

border-radius:16px;

background:
linear-gradient(
135deg,
#f7fff9,
#e8fff1
);

border:1px solid rgba(0,166,81,.15);
}

.summary-card div{
margin:6px 0;
font-weight:700;
font-size:12px;
}

.plan-cta{

margin-top:14px;

background:
linear-gradient(
135deg,
#00a651,
#00c76a
);

color:white;

padding:14px;

border-radius:14px;

text-align:center;

font-weight:900;

font-size:15px;

cursor:pointer;

box-shadow:
0 12px 25px rgba(0,166,81,.35);
}

.modal-overlay{

position:fixed;
inset:0;

background:rgba(0,0,0,.45);

display:none;

align-items:center;
justify-content:center;

padding:20px;
}

.modal-box{

background:white;

padding:20px;

border-radius:20px;

width:100%;
max-width:380px;
}

.modal-title{

font-weight:900;

margin-bottom:6px;

font-size:22px;

color:var(--theme);
}

.modal-details{

background:#fafafa;

padding:14px;

border-radius:14px;

margin-bottom:14px;

line-height:1.8;

font-size:14px;
}

.modal-footer{

display:flex;
justify-content:flex-end;
gap:10px;
}

.btn{

padding:12px 14px;

border-radius:12px;

border:0;

cursor:pointer;

font-weight:800;
}

.btn-primary{

background:
linear-gradient(
135deg,
#00a651,
#00c76a
);

color:white;
}

.btn-ghost{
background:#eee;
}

</style>
</head>

<body>

<div class="wave one"></div>
<div class="wave two"></div>

<div class="page">

<header class="header">

<div class="title-block">
<h1>Mix Bundle</h1>
<p>Voice • SMS • Data</p>
</div>

<div class="logo-wrap">
<img src="assets/ecocash.png" class="logo-eco">
<img src="assets/logo.avif" class="logo-dark">
</div>

</header>

<div class="price-circle">

<h2 id="priceCircle">
$0.00
</h2>

<span>
Bundle Price
</span>

</div>

<div class="duration-tabs">

<div class="tab active"
onclick="selectPlan('daily',this)">
Daily
</div>

<div class="tab"
onclick="selectPlan('3days',this)">
3 Days
</div>

<div class="tab"
onclick="selectPlan('weekly',this)">
Weekly
</div>

<div class="tab"
onclick="selectPlan('2weeks',this)">
2 Weeks
</div>

<div class="tab"
onclick="selectPlan('monthly',this)">
Monthly
</div>

</div>

<div class="plan-card">

<div class="plan-tag">
MIX IT YOUR WAY 📱
</div>

<div class="plan-name">
Bundle Builder
</div>

<div class="plan-duration">
Customise your Voice, SMS and Data bundle.
</div>

<div class="input-group">

<label>
<span>Voice</span>
<span class="slider-value" id="voiceValue">
0 Min
</span>
</label>

<input
type="range"
id="voice"
value="0"
oninput="calculateBundle()">

</div>

<div class="input-group">

<label>
<span>SMS</span>
<span class="slider-value" id="smsValue">
0 SMS
</span>
</label>

<input
type="range"
id="sms"
value="0"
oninput="calculateBundle()">

</div>

<div class="input-group">

<label>
<span>Data</span>
<span class="slider-value" id="dataValue">
0 GB
</span>
</label>

<input
type="range"
id="data"
value="0"
oninput="calculateBundle()">

</div>

<div class="summary-card">

<div>
📆 <span id="summaryDuration">Daily</span>
</div>

<div>
📞 <span id="summaryVoice">0 Minutes</span>
</div>

<div>
💬 <span id="summarySms">0 SMS</span>
</div>

<div>
🌐 <span id="summaryData">0 GB</span>
</div>

<div>
💵 <span id="summaryAmount">USD 0.00</span>
</div>

</div>

<div class="plan-cta"
onclick="openBundleModal()">

Pay with EcoCash

</div>

</div>

</div>

<div class="modal-overlay" id="modal">

<div class="modal-box">

<div class="modal-title">
Confirm Bundle
</div>

<div class="modal-details" id="details"></div>

<div class="modal-footer">

<button class="btn btn-ghost"
onclick="closeModal()">
Cancel
</button>

<button class="btn btn-primary"
onclick="goLogin()">

Pay Now

</button>

</div>

</div>

</div>

<script>

let currentPlan = "daily";

const plans = {

daily:{
maxData:3,
maxVoice:20,
maxSms:25,
price:0.60
},

"3days":{
maxData:8,
maxVoice:50,
maxSms:75,
price:1.40
},

weekly:{
maxData:20,
maxVoice:120,
maxSms:200,
price:2.80
},

"2weeks":{
maxData:45,
maxVoice:250,
maxSms:450,
price:5.20
},

monthly:{
maxData:100,
maxVoice:600,
maxSms:1000,
price:9.90
}

};

function selectPlan(plan,el){

currentPlan = plan;

document.querySelectorAll(".tab")
.forEach(tab=>tab.classList.remove("active"));

el.classList.add("active");

updatePlan();

}

function updatePlan(){

const plan = plans[currentPlan];

const voice =
document.getElementById("voice");

const sms =
document.getElementById("sms");

const data =
document.getElementById("data");

voice.max = plan.maxVoice;
sms.max = plan.maxSms;
data.max = plan.maxData;

voice.value = plan.maxVoice;
sms.value = plan.maxSms;
data.value = plan.maxData;

calculateBundle();

}

function calculateBundle(){

const plan = plans[currentPlan];

const voice =
Number(document.getElementById("voice").value);

const sms =
Number(document.getElementById("sms").value);

const data =
Number(document.getElementById("data").value);

document.getElementById("voiceValue")
.innerHTML = voice + " Min";

document.getElementById("smsValue")
.innerHTML = sms + " SMS";

document.getElementById("dataValue")
.innerHTML = data + " GB";

const total =
(
(data / plan.maxData) +
(voice / plan.maxVoice) +
(sms / plan.maxSms)
) / 3 * plan.price;

document.getElementById("priceCircle")
.innerHTML =
"$" + total.toFixed(2);

document.getElementById("summaryDuration")
.innerHTML = currentPlan;

document.getElementById("summaryVoice")
.innerHTML = voice + " Minutes";

document.getElementById("summarySms")
.innerHTML = sms + " SMS";

document.getElementById("summaryData")
.innerHTML = data + " GB";

document.getElementById("summaryAmount")
.innerHTML =
"USD " + total.toFixed(2);

}

function openBundleModal(){

const voice =
document.getElementById("voice").value;

const sms =
document.getElementById("sms").value;

const data =
document.getElementById("data").value;

const amount =
document.getElementById("summaryAmount")
.textContent;

document.getElementById("details").innerHTML = `

<div>
<strong>Duration:</strong>
${currentPlan}
</div>

<div>
<strong>Voice:</strong>
${voice} Minutes
</div>

<div>
<strong>SMS:</strong>
${sms} SMS
</div>

<div>
<strong>Data:</strong>
${data} GB
</div>

<div>
<strong>Amount:</strong>
${amount}
</div>

`;

document.getElementById("modal")
.style.display = "flex";

}

function closeModal(){

document.getElementById("modal")
.style.display = "none";

}

function goLogin(){

window.location.href =
"login.html";

}

document.getElementById("modal")
.onclick = function(e){

if(e.target === this){

closeModal();

}

};

updatePlan();

</script>

</body>
</html>
